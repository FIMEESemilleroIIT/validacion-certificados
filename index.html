<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Credenciales | FIMEE - UNICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img src="logofimee.png" alt="Universidad Nacional San Luis Gonzaga" class="inst-logo" border="0">
                <img src="logounica.png" alt="FIMEE" class="inst-logo" border="0">
            </div>
            <h2>Universidad Nacional San Luis Gonzaga</h2>
            <p>Facultad de Ingeniería Mecánica Eléctrica y Electrónica</p>
            <h1>Validación Institucional de Credenciales</h1>
        </header>

        <main>
            <section id="loading-state" class="loading-container">
                <div class="spinner"></div>
                <p>Verificando credencial en nuestro sistema...</p>
            </section>

            <section id="validation-result" class="result-container hidden">
                <!-- El contenido se inyecta dinámicamente vía JavaScript -->
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Universidad Nacional San Luis Gonzaga. Documento Oficial.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
